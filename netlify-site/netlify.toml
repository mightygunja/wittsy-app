[build]
  publish = "public"
  command = ""

# Serve well-known files as JSON (must come before the catch-all redirect)
[[headers]]
  for = "/.well-known/*"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "no-cache, no-store, must-revalidate"

[[redirects]]
  from = "/game/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/room/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
